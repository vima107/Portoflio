<section class="projects-section">

    <div class="container">

        <div class="section-header">

            <span class="section-tag">
                — projects —
            </span>

            <h2 class="section-title">
                Things I've Built
            </h2>

        </div>

        <div class="row g-4 justify-content-evenly">

            @for(project of data; track $index){

            <div class="col-lg-6">

                <div class="project-card">

                    <div class="project-header">

                        <h4>
                            {{project.title}}
                        </h4>

                    </div>

                    <div class="project-body">

                        <p
                            class="project-description"
                            [class.expanded]="expandedProjects[$index]"
                            [innerHTML]="project.description">
                        </p>

                        <button
                            class="btn view-btn"
                            (click)="toggleDescription($index)">

                            {{ expandedProjects[$index] ? 'View Less' : 'View More →' }}

                        </button>

                    </div>

                </div>

            </div>

            }

        </div>

    </div>

</section>
