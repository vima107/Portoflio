<app-navigation-bar></app-navigation-bar>

<section id="home" class="hero-section">

  <div class="container">

    <div class="row align-items-center hero-row">
  
      <!-- Left Side -->

      <div class="col-lg-7 order-2 order-lg-1">

        @if(portfolioData()){   

        <p class="hero-greeting">
          Hello, I'm
        </p>

        <h1 class="hero-name">
          {{portfolioData().name}}
        </h1>

        <h4 class="hero-role">
          {{portfolioData().jobRole}}
        </h4>

        <div 
          class="hero-description"
          [innerHTML]="portfolioData().description[0]?.descripition">
        </div>

        <div class="d-flex flex-wrap gap-3 hero-buttons">

          <a
            class="btn btn-download"
            [href]="'data:application/pdf;base64,' + portfolioData().resume"
            download="resume.pdf">

            Download CV

          </a>

          <a
            href="#contact"
            class="btn btn-contact">

            Contact Me

          </a>

        </div>

        }

      </div>

      <!-- Right Side -->

      <div class="col-lg-5 d-flex justify-content-lg-end justify-content-center mt-5 mt-lg-0 order-1 order-lg-2">

        @if(portfolioData()){

        <div class="profile-card">

          <img
            [src]="'data:image/jpeg;base64,' + portfolioData().image"
            class="profile-image"
            alt="Profile">

        </div>

        }

      </div>

    </div>

  </div>

</section>

<section id="skills">
  <app-skills-page [data]="portfolioData()?.skills"></app-skills-page>
</section>

<section id="projects">
  <app-projects-page [data]="portfolioData()?.projects"></app-projects-page>
</section>

<section id="contact">
  <app-contact-page [data]="portfolioData()?.contacts"></app-contact-page>
</section>
